name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    # ✅ Use official Zephyr container (important)
    container:
      image: ghcr.io/zephyrproject-rtos/ci:latest

    steps:
      # ✅ Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Build unit test (no west init/update needed)
      - name: Build unit test (ring buffer)
        run: |
          west build -b native_sim tests/unit/ringbuf --build-dir build_test

      # ✅ Run test
      - name: Run unit test
        run: |
          cd build_test
          ninja run